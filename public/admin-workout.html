<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#121212" />
  <title>UltraFit Admin | Manage Workout Plans</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Archivo:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    /* ========== EXACT SAME STYLES AS WORKOUT.HTML (with admin extras) ========== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background-color: #121212;
      font-family: 'Montserrat', 'Archivo', sans-serif;
      color: #eaeaea;
      scroll-behavior: smooth;
      overflow-x: hidden;
    }
    :root {
      --gold: #FFD700;
      --gold-glow: 0 0 12px rgba(255,215,0,0.4);
      --dark-bg: #121212;
      --card-bg: rgba(28,28,32,0.88);
      --glass-edge: 1px solid rgba(255,215,0,0.2);
    }
    .container {
      max-width: 1300px;
      margin: 0 auto;
      padding: 0 2rem;
    }
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 1000;
      background: transparent;
      transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      padding: 1.2rem 0;
    }
    .navbar.scrolled {
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
      padding: 0.7rem 0;
    }
    .nav-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo-wrapper {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }
    .nav-logo-img {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid rgba(255, 215, 0, 0.4);
    }
    .logo {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: 2px;
    }
    .logo-ultra { color: #ffffff; }
    .logo-fit { color: #FFD700; }
    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
      align-items: center;
    }
    .nav-link {
      color: #f0f0f0;
      text-decoration: none;
      font-weight: 500;
      font-size: 0.95rem;
      transition: all 0.2s ease;
      padding: 0.5rem 0;
      position: relative;
    }
    .nav-link:not(.join-now-nav):hover { color: #FFD700; }
    .nav-link:not(.join-now-nav)::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: #FFD700;
      transform: scaleX(0);
      transition: transform 0.2s ease;
    }
    .nav-link:not(.join-now-nav):hover::after { transform: scaleX(1); }
    .join-now-nav {
      background: #FFD700;
      color: #121212 !important;
      padding: 0.6rem 1.6rem !important;
      border-radius: 40px;
      font-weight: 700;
      transition: all 0.3s ease;
      white-space: nowrap;
    }
    .join-now-nav:hover {
      background: #e6c300;
      transform: translateY(-2px);
    }
    .hamburger {
      display: none;
      font-size: 1.8rem;
      cursor: pointer;
      color: #FFD700;
      min-width: 44px;
      text-align: center;
    }
    @media (max-width: 900px) {
      .nav-links {
        display: none;
        flex-direction: column;
        position: absolute;
        top: 70px;
        left: 0;
        width: 100%;
        background: rgba(0, 0, 0, 0.95);
        backdrop-filter: blur(12px);
        padding: 1.5rem;
        gap: 1.2rem;
        text-align: center;
      }
      .nav-links.active { display: flex; }
      .hamburger { display: block; }
      .container { padding: 0 1.5rem; }
      .join-now-nav {
        padding: 0.5rem 1.2rem !important;
        font-size: 0.9rem;
      }
    }
    .workout-hero {
      position: relative;
      min-height: 65vh;
      background: linear-gradient(115deg, #000000d9 0%, #0a0a0a 100%), url('https://images.pexels.com/photos/1954524/pexels-photo-1954524.jpeg?auto=compress&cs=tinysrgb&w=1600');
      background-size: cover;
      background-position: center 35%;
      background-attachment: fixed;

      align-items: center;
      justify-content: center;

      border-bottom: 2px solid rgba(255,215,0,0.3);

    .hero-content-center h1 {

    .edit-category-btn, .add-day-btn {

    .carousel-slide {

      border: 1px solid #FFD700;

    .confirm-modal, .success-modal {

    .confirm-card, .success-card {

    .confirm-yes, .confirm-no, .success-card button {

    footer {

<div id="modalContainer" class="premium-modal"></div>

<script>
  // ========== WORKOUT ADMIN WITH HARDCODED CATEGORIES & 6 DEFAULT DAYS ==========
  const API_BASE = '/api';
  const DEFAULT_IMAGE = 'https://images.pexels.com/photos/1954524/pexels-photo-1954524.jpeg?auto=compress&w=400';
  
  // Hardcoded categories (no need to fetch from DB)
  const HARD_CODED_CATEGORIES = [
    { key: "beginner", displayName: "Beginner", subheading: "Foundation – 1 to 6 Months", order: 1 },
    { key: "intermediate", displayName: "Intermediate", subheading: "Strength Building – 1 to 2 Years", order: 2 },
    { key: "expert", displayName: "Expert", subheading: "Advanced Performance – 3+ Years", order: 3 }
  ];

  // Default exercises for a new day (4 exercises)
  const DEFAULT_EXERCISES = [
    { name: "Warm-up", reps: "10 min cardio" },
    { name: "Main exercise 1", reps: "3x10" },
    { name: "Main exercise 2", reps: "3x12" },
    { name: "Cool-down", reps: "5 min stretching" }
  ];

  // Default image for a new day
  const DEFAULT_IMAGES = [{ url: DEFAULT_IMAGE, label: "Workout" }];

  // Authentication
  let adminToken = localStorage.getItem('adminToken');
  let isAuthenticated = !!adminToken;

  function getAuthHeaders() {
    return adminToken ? { 'Authorization': `Bearer ${adminToken}` } : {};
  }

  if (!isAuthenticated) {
    alert('Please log in to the admin panel first.');
    window.location.href = 'admin.html';
  }

  function showToast(msg, isError = false) {
    const toast = document.getElementById('adminToast');
    toast.innerText = msg;
    toast.style.borderLeftColor = isError ? '#e74c3c' : '#FFD700';
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  }

  function confirmAction(message) {
    return new Promise((resolve) => {
      const modal = document.getElementById('confirmModal');
      document.getElementById('confirmMessage').innerText = message;
      modal.style.display = 'flex';
      const yesBtn = document.getElementById('confirmYesBtn');
      const noBtn = document.getElementById('confirmNoBtn');
      const cleanup = () => {
        yesBtn.removeEventListener('click', yesHandler);
        noBtn.removeEventListener('click', noHandler);
        modal.style.display = 'none';
      };
      const yesHandler = () => { cleanup(); resolve(true); };
      const noHandler = () => { cleanup(); resolve(false); };
      yesBtn.addEventListener('click', yesHandler);
      noBtn.addEventListener('click', noHandler);
    });
  }

  function showSuccessModal(message) {
    return new Promise((resolve) => {
      const modal = document.getElementById('successModal');
      document.getElementById('successMessage').innerText = message;
      modal.style.display = 'flex';

  async function fetchJSON(url, options = {}) {
    try {
      const res = await fetch(url, {
        ...options,
        headers: { 
          'Content-Type': 'application/json',
          ...getAuthHeaders(),
          ...options.headers
        }
      });
      if (res.status === 401) {
        localStorage.removeItem('adminToken');
        adminToken = null;
        alert('Session expired. Please login again.');
        window.location.href = 'admin.html';
        return null;
      }
      const text = await res.text();
      let data;
      try { data = JSON.parse(text); } catch(e) { data = text; }
      if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
      return data;
    } catch (err) {
      console.error(err);
      showToast(err.message, true);
      return null;
    }
  }

  async function loadAllData() {
    // Load site settings
    const settings = await fetchJSON(`${API_BASE}/sitesettings`);
    if (settings) siteSettings = settings;
    
    // Load existing workout days
    const days = await fetchJSON(`${API_BASE}/workoutdays`);
    if (days) workoutDays = days;
    else workoutDays = [];
    
    // Ensure each category has exactly 6 days (create missing ones)
    await ensureDefaultDays();
    
    renderHero();
    renderWorkoutSections();
  }

  async function ensureDefaultDays() {
    // For each category, check if there are at least 6 days
    for (const cat of HARD_CODED_CATEGORIES) {
      const existingDays = workoutDays.filter(d => d.categoryKey === cat.key);
      const existingCount = existingDays.length;
      if (existingCount < 6) {
        // Need to create missing days
        for (let i = existingCount + 1; i <= 6; i++) {
          const defaultDayTitle = `Day ${i}`;
          const newOrder = i;
          const payload = {
            dayTitle: defaultDayTitle,
            order: newOrder,
            exercises: DEFAULT_EXERCISES.map(ex => ({ ...ex })),
            images: DEFAULT_IMAGES.map(img => ({ ...img })),
            categoryKey: cat.key
          };
          const created = await fetchJSON(`${API_BASE}/workoutdays`, { method: 'POST', body: JSON.stringify(payload) });
          if (created) {
            workoutDays.push(created);
          }
        }
        // Reload days after creation to get fresh IDs
        const refreshed = await fetchJSON(`${API_BASE}/workoutdays`);
        if (refreshed) workoutDays = refreshed;
      }
    }
  }

  function createCarousel(container, images) {
    if (!images.length) return;
    const carouselDiv = document.createElement('div');
    carouselDiv.className = 'workout-carousel';
    const track = document.createElement('div');
    track.className = 'carousel-track';
    images.forEach(img => {
      const slide = document.createElement('div');
      slide.className = 'carousel-slide';
      slide.innerHTML = `<img src="${img.url}" alt="exercise"><div class="image-label">${escapeHtml(img.label)}</div>`;
      track.appendChild(slide);
    });
    carouselDiv.appendChild(track);
    const controls = document.createElement('div');
    controls.className = 'carousel-controls';
    const prevBtn = document.createElement('button');
    prevBtn.className = 'carousel-btn';
    prevBtn.innerHTML = '<i class="fas fa-chevron-left"></i>';
    const nextBtn = document.createElement('button');
    nextBtn.className = 'carousel-btn';
    nextBtn.innerHTML = '<i class="fas fa-chevron-right"></i>';
    controls.append(prevBtn, nextBtn);
    const dotsDiv = document.createElement('div');
    dotsDiv.className = 'carousel-dots';
    carouselDiv.append(controls, dotsDiv);
    container.appendChild(carouselDiv);

    let current = 0;
    let autoTimer, pauseTimer;
    const update = () => {
      track.style.transform = `translateX(-${current * 100}%)`;
      Array.from(dotsDiv.children).forEach((dot, i) => dot.classList.toggle('active', i === current));
    };
    for (let i = 0; i < images.length; i++) {
      const dot = document.createElement('div');
      dot.classList.add('dot');
      dot.addEventListener('click', () => { current = i; update(); resetAuto(); });
      dotsDiv.appendChild(dot);
    }
    prevBtn.addEventListener('click', () => { current = (current - 1 + images.length) % images.length; update(); resetAuto(); });
    nextBtn.addEventListener('click', () => { current = (current + 1) % images.length; update(); resetAuto(); });
    function startAuto() { if (autoTimer) clearInterval(autoTimer); autoTimer = setInterval(() => { current = (current + 1) % images.length; update(); }, 3000); }
    function resetAuto() { if (pauseTimer) clearTimeout(pauseTimer); if (autoTimer) clearInterval(autoTimer); pauseTimer = setTimeout(startAuto, 6000); }
    startAuto();
    update();
  }

            <img id="currentHeroImagePreview" class="modal-image" 
                 src="${currentImageUrl}" 
                 onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22200%22%20height%3D%22100%22%3E%3Crect%20width%3D%22200%22%20height%3D%22100%22%20fill%3D%22%23333%22%2F%3E%3Ctext%20x%3D%2250%25%22%20y%3D%2250%25%22%20text-anchor%3D%22middle%22%20fill%3D%22%23FFD700%22%3ENo%20Image%3C%2Ftext%3E%3C%2Fsvg%3E'">
          </div>
        </div>
        <div class="field-group">
          <label>Upload New Hero Image</label>
          <div class="image-upload-area" id="heroBgUploadArea">
            <i class="fas fa-cloud-upload-alt"></i> Click to upload
          </div>
        </div>
        <div class="field-group">
          <label>Title (Heading)</label>
          <input type="text" id="heroTitleInput" value="${escapeHtml(currentTitle)}">
        </div>
        <div class="field-group">
          <label>Subheading</label>
          <input type="text" id="heroSubInput" value="${escapeHtml(currentSub)}">
        </div>
        <div class="modal-buttons">
          <button class="modal-btn-cancel" id="modalCancelBtn">Cancel</button>
          <button class="modal-btn-save" id="modalSaveBtn">Save Changes</button>
        </div>
      </div>
    `;
    modal.style.display = 'flex';

    let newImageUrl = currentImageUrl;
    const previewImg = document.getElementById('currentHeroImagePreview');
    const uploadArea = document.getElementById('heroBgUploadArea');
    uploadArea.onclick = async () => {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*';
      input.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const formData = new FormData();
        formData.append('image', file);
        const originalText = uploadArea.innerText;
        uploadArea.style.opacity = '0.6';
        uploadArea.style.cursor = 'wait';
        uploadArea.innerText = 'Uploading...';
        try {
          const res = await fetch('/api/upload', {
            method: 'POST',
            headers: getAuthHeaders(),
            body: formData
          });
          if (res.status === 401) {
            localStorage.removeItem('adminToken');
            adminToken = null;
            alert('Session expired. Please login again.');
            window.location.href = 'admin.html';
            return;
          }
          const data = await res.json();
          if (data.url) {
            newImageUrl = data.url;
            previewImg.src = newImageUrl;
            showToast('Image uploaded. Click Save to apply.');
          } else {
            showToast('Upload failed', true);
          }
        } catch (err) {
          showToast('Upload error: ' + err.message, true);
        } finally {
          uploadArea.style.opacity = '1';
          uploadArea.style.cursor = 'pointer';
          uploadArea.innerText = originalText;
        }
      };
      input.click();
    };

    document.getElementById('modalCancelBtn').onclick = async () => {
      if (await confirmAction('Discard changes?')) modal.style.display = 'none';
    };
    document.getElementById('modalSaveBtn').onclick = async () => {
      if (!await confirmAction('Save changes?')) return;
      const updatedSettings = {
        workoutHeroHeading: document.getElementById('heroTitleInput').value,
        workoutHeroSubheading: document.getElementById('heroSubInput').value,
        workoutHeroImage: newImageUrl
      };
      const res = await fetchJSON(`${API_BASE}/sitesettings`, {
        method: 'PUT',
        body: JSON.stringify(updatedSettings)
      });
      if (res) {
        siteSettings = { ...siteSettings, ...updatedSettings };
        renderHero();
        modal.style.display = 'none';
        await showSuccessModal('Hero section updated');
      } else {
        showToast('Update failed', true);
      }
    };
  }

  function renderWorkoutSections() {
    const root = document.getElementById('workoutRoot');
    root.innerHTML = '';
    // Use hardcoded categories (their subheadings may be overridden by siteSettings)
    const subheadingsFromSettings = siteSettings.workoutCategorySubheadings || {};
    const categoriesToRender = HARD_CODED_CATEGORIES.map(cat => ({
      ...cat,
      subheading: subheadingsFromSettings[cat.key] || cat.subheading
    }));
    
    categoriesToRender.forEach(cat => {
      const catDays = workoutDays.filter(d => d.categoryKey === cat.key).sort((a,b) => a.order - b.order);
      const sectionDiv = document.createElement('div');
      sectionDiv.innerHTML = `
        <div class="category-header">
          <div class="category-luxury"><span>${escapeHtml(cat.displayName)}</span></div>
          <div style="display: flex; gap: 0.8rem;">
            <button class="add-day-btn" data-cat-key="${cat.key}"><i class="fas fa-plus"></i> Add</button>
            <button class="edit-category-btn" data-cat-key="${cat.key}"><i class="fas fa-edit"></i> Edit Category</button>
          </div>
        </div>
        <div class="category-sub">${escapeHtml(cat.subheading)}</div>
        <div class="workout-cards-grid" id="grid-${cat.key}"></div>
      `;
      root.appendChild(sectionDiv);
      const grid = document.getElementById(`grid-${cat.key}`);
      if (catDays.length === 0) {
        grid.innerHTML = '<p style="color: #aaa; text-align:center;">No days yet. Click "+ Add" to create a workout day.</p>';
      } else {
        catDays.forEach(day => {
          const card = document.createElement('div');
          card.className = 'workout-card';
          const exercisesHtml = day.exercises.map(ex => `<div class="exercise-item"><span class="exercise-name">${escapeHtml(ex.name)}</span><span class="exercise-reps">${escapeHtml(ex.reps)}</span></div>`).join('');
          card.innerHTML = `
            <div class="card-header">
              <h3>${escapeHtml(day.dayTitle)}</h3>
              <button class="admin-edit-btn" data-day-id="${day._id}"><i class="fas fa-edit"></i> Edit</button>
            </div>
            <div class="exercise-list">${exercisesHtml}</div>
            <div class="card-carousel-container"></div>
          `;
          grid.appendChild(card);
          const carouselContainer = card.querySelector('.card-carousel-container');
          if (day.images && day.images.length) {
            createCarousel(carouselContainer, day.images);
          }
        });
      }
    });
    
    // Attach event listeners for category edit and add day
    document.querySelectorAll('.edit-category-btn').forEach(btn => {
      const catKey = btn.getAttribute('data-cat-key');
      const category = HARD_CODED_CATEGORIES.find(c => c.key === catKey);
      btn.addEventListener('click', () => editCategory(category));
    });
    document.querySelectorAll('.add-day-btn').forEach(btn => {
      const catKey = btn.getAttribute('data-cat-key');
      btn.addEventListener('click', () => addNewDay(catKey));
    });
    document.querySelectorAll('.admin-edit-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const dayId = btn.getAttribute('data-day-id');
        openDayEditor(dayId);
      });
    });
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, (m) => {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  document.getElementById('editHeroBtn').addEventListener('click', editHero);

  const navbar = document.getElementById('navbar');
  window.addEventListener('scroll', () => {
    if (window.scrollY > 50) navbar.classList.add('scrolled');
    else navbar.classList.remove('scrolled');
  });
  const hamburger = document.getElementById('hamburger');
  const navLinksEl = document.getElementById('navLinks');
  if (hamburger) hamburger.addEventListener('click', () => navLinksEl.classList.toggle('active'));

  loadAllData();
</script>
</body>
</html>
