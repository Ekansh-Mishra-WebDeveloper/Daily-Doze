<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generating PDF – UltraFit Gym Workout</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #1a1a1a;
      font-family: 'Montserrat', 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .pdf-preview {
      max-width: 1000px;
      margin: 0 auto;
      background: #0a0a0a;
      border-radius: 16px;
      box-shadow: 0 20px 35px rgba(0,0,0,0.5);
      overflow: hidden;
    }
    .loading {
      text-align: center;
      padding: 3rem;
      color: #FFD700;
      font-size: 1.2rem;
      font-weight: 600;
      background: #0a0a0a;
    }
    /* PDF content styles – premium dark theme */
    .pdf-content {
      background: #0a0a0a;
      padding: 2rem;
      color: #eaeaea;
      font-family: 'Montserrat', 'Segoe UI', sans-serif;
    }
    .pdf-content .logo-pdf {
      text-align: center;
      margin-bottom: 1rem;
    }
    .pdf-content .logo-pdf img {
      width: 80px;
      border-radius: 50%;
      border: 2px solid #FFD700;
      padding: 4px;
      background: #0a0a0a;
    }
    .pdf-content h1 {
      color: #FFD700;
      font-size: 2.5rem;
      text-align: center;
      margin-bottom: 0.5rem;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    .pdf-content .subhead {
      text-align: center;
      color: #aaaaaa;
      margin-bottom: 2rem;
      border-bottom: 2px solid #FFD700;
      display: inline-block;
      width: auto;
      margin-left: auto;
      margin-right: auto;
      padding-bottom: 0.3rem;
      font-weight: 500;
    }
    .day-section {
      margin-bottom: 2rem;
      page-break-inside: avoid;
      background: rgba(255,255,255,0.03);
      border-radius: 16px;
      padding: 0.5rem;
    }
    .day-header-pdf {
      background: #1a1a1a;
      padding: 0.8rem;
      border-left: 6px solid #FFD700;
      margin-bottom: 1rem;
      font-size: 1.4rem;
      font-weight: 700;
      color: #FFD700;
      border-radius: 12px 0 0 12px;
    }
    .pdf-content table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 1rem;
      background: rgba(255,255,255,0.02);
      border-radius: 12px;
      overflow: hidden;
    }
    .pdf-content th, .pdf-content td {
      border: 1px solid #2a2a2a;
      padding: 10px;
      vertical-align: top;
    }
    .pdf-content th {
      background: #1a1a1a;
      color: #FFD700;
      font-weight: 700;
      text-transform: uppercase;
      font-size: 0.85rem;
      letter-spacing: 1px;
    }
    .pdf-content td {
      color: #dddddd;
    }
    .image-gallery {
      margin-top: 1rem;
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .image-gallery img {
      max-width: 120px;
      border-radius: 8px;
      border: 1px solid #FFD700;
      padding: 2px;
      background: #1a1a1a;
    }
    .image-label-small {
      font-size: 0.7rem;
      color: #FFD700;
      text-align: center;
      margin-top: 4px;
    }
    .summary-card {
      margin-top: 2rem;
      background: linear-gradient(145deg, #1a1a1a, #0a0a0a);
      padding: 1.5rem;
      border-radius: 20px;
      border: 1px solid rgba(255,215,0,0.3);
      text-align: center;
    }
    .summary-card h3 {
      color: #FFD700;
      margin-bottom: 1rem;
      font-size: 1.4rem;
    }
    .summary-card p {
      font-size: 1.1rem;
      margin: 0.5rem 0;
    }
    .summary-card span {
      color: #FFD700;
      font-weight: 800;
    }
    .pdf-footer {
      margin-top: 2rem;
      text-align: center;
      font-size: 0.8rem;
      color: #777;
      border-top: 1px solid #2a2a2a;
      padding-top: 1rem;
    }
  </style>
</head>
<body>
<div class="pdf-preview">
  <div class="loading" id="loadingMsg">📄 Generating your premium workout PDF...<br>Please wait, this may take a few seconds.</div>
</div>

<script>
  const API_BASE = window.location.hostname === 'localhost' 
    ? '/api' 
    : 'https://ultrafit-gym-unnao.onrender.com/api';
  const urlParams = new URLSearchParams(window.location.search);
  const categoryKey = urlParams.get('category');   // e.g., beginner, intermediate, advanced

  if (!categoryKey) {
    document.body.innerHTML = '<div style="color:#FFD700; text-align:center; padding:2rem;">Missing parameter. Use ?category=beginner</div>';
    throw new Error('Missing category parameter');
  }

  async function fetchJSON(url) {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status} – ${url}`);
    return res.json();
  }

  async function loadAndGenerate() {
    try {
      const [categories, days] = await Promise.all([
        fetchJSON(`${API_BASE}/workoutcategories`),
        fetchJSON(`${API_BASE}/workoutdays`)
      ]);

      const category = categories.find(c => c.key === categoryKey);
      if (!category) throw new Error(`Category "${categoryKey}" not found`);
      const displayName = category.displayName;
      const subheading = category.subheading || 'Structured training for maximum results';
      const filteredDays = days.filter(d => d.categoryKey === categoryKey).sort((a,b) => a.order - b.order);
      if (!filteredDays.length) throw new Error(`No workout days found for ${displayName}`);

      let html = `
        <div class="pdf-content">
          <div class="logo-pdf">
            <img src="UltraFit logo.png" alt="UltraFit Gym" onerror="this.src='https://via.placeholder.com/80?text=UltraFit'">
          </div>
          <h1>${escapeHtml(displayName)} Workout Plan</h1>
          <div style="text-align:center;"><span class="subhead">UltraFit Gym • ${escapeHtml(subheading)}</span></div>
          <p style="text-align:center; margin-top:1rem; color:#aaa;">Generated on ${new Date().toLocaleDateString()}</p>
      `;

      let totalExercises = 0;
      for (const day of filteredDays) {
        totalExercises += day.exercises.length;
        html += `<div class="day-section"><div class="day-header-pdf">💪 ${escapeHtml(day.dayTitle)}</div>`;
        html += `<tr><thead><tr><th>Exercise</th><th>Sets / Reps</th></tr></thead><tbody>`;
        day.exercises.forEach(ex => {
          html += `<tr><td>${escapeHtml(ex.name)}</td><td>${escapeHtml(ex.reps)}</td></tr>`;
        });
        html += `</tbody></table>`;

        // Carousel images (GIFs supported)
        if (day.images && day.images.length) {
          html += `<div class="image-gallery">`;
          day.images.forEach(img => {
            html += `<div><img src="${img.url}" alt="${escapeHtml(img.label)}"><div class="image-label-small">${escapeHtml(img.label)}</div></div>`;
          });
          html += `</div>`;
        }
        html += `</div>`;
      }

      html += `
        <div class="summary-card">
          <h3>🔥 Workout Summary</h3>
          <p>Total Days: <span>${filteredDays.length}</span></p>
          <p>Total Exercises: <span>${totalExercises}</span></p>
        </div>
        <div class="pdf-footer">
          © UltraFit Gym – Empowering your transformation
        </div>
      </div>`;

      const container = document.querySelector('.pdf-preview');
      container.innerHTML = html;
      const element = document.querySelector('.pdf-content');

      await new Promise(resolve => setTimeout(resolve, 500));

      const opt = {
        margin: [0.5, 0.5, 0.5, 0.5],
        filename: `UltraFit_Workout_${displayName}.pdf`,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, useCORS: true, letterRendering: true, backgroundColor: '#0a0a0a' },
        jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
      };
      await html2pdf().from(element).set(opt).save();

      setTimeout(() => window.close(), 1500);
    } catch (err) {
      console.error(err);
      document.body.innerHTML = `<div style="color:#FFD700; text-align:center; padding:2rem;">Error: ${err.message}<br><button onclick="window.close()" style="margin-top:1rem; background:#FFD700; border:none; padding:0.5rem 1rem; border-radius:40px;">Close</button></div>`;
    }
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  loadAndGenerate();
</script>
</body>
</html>
